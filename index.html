<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a110d">
    <title>MacroTrack</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --bg: #0a110d;
            --surface: #111a14;
            --surface2: #182018;
            --protein: #10b981;
            --carbs: #34d399;
            --fat: #facc15;
            --calories: #6b7280;
            --text: #ecfdf5;
            --text-muted: #7a9e86;
            --border: #1e3028;
            --nav-height: 70px;
        }

        html, body {
            width: 100%;
            min-height: 100%;
            background: var(--bg);
        }

        body {
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding-bottom: var(--nav-height);
            overflow-x: hidden;
            -webkit-text-size-adjust: 100%;
        }

        body.modal-open {
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        input, textarea, select, button {
            font: inherit;
        }

        input, textarea, select {
            -webkit-appearance: none;
            appearance: none;
            border-radius: 0;
            touch-action: manipulation;
        }

        input:focus, textarea:focus, select:focus {
            caret-color: var(--protein);
        }

        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: var(--nav-height);
            background: rgba(17,26,20,0.99);
            border-top: 1px solid var(--border);
            display: flex;
            z-index: 100;
        }
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
            color: var(--text-muted);
            padding: 8px 0;
            transition: color 0.2s;
            touch-action: manipulation;
        }
        .nav-item.active { color: var(--protein); }
        .nav-item svg { width: 22px; height: 22px; }
        .nav-item span { font-size: 10px; font-weight: 600; letter-spacing: 0.3px; }

        .page { display: none; padding: 20px 16px; min-height: calc(100vh - var(--nav-height)); animation: fadeIn 0.2s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        .page-header { margin-bottom: 24px; }
        .page-header h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
        .page-header p { color: var(--text-muted); font-size: 14px; margin-top: 4px; }

        .card { background: var(--surface); border-radius: 16px; padding: 20px; margin-bottom: 16px; border: 1px solid var(--border); }
        .card-title { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }

        .protein-ring-container { display: flex; flex-direction: column; align-items: center; }
        .protein-ring-wrap { position: relative; width: 180px; height: 180px; }
        .ring-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; }
        .ring-label .ring-value { font-size: 36px; font-weight: 800; color: var(--protein); line-height: 1; }
        .ring-label .ring-unit { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

        .mini-rings { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
        .mini-ring-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .mini-ring-label { text-align: center; }
        .mini-ring-label .val { font-size: 15px; font-weight: 700; }
        .mini-ring-label .sub { font-size: 10px; color: var(--text-muted); }
        .mini-ring-label .name { font-size: 10px; color: var(--text-muted); }

        .fab {
            position: fixed;
            bottom: calc(var(--nav-height) + 16px);
            right: 16px;
            height: 52px;
            padding: 0 22px;
            border-radius: 100px;
            background: var(--protein);
            border: none;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            box-shadow: 0 4px 24px rgba(16,185,129,0.45);
            transition: all 0.2s;
            z-index: 50;
            font-size: 15px; font-weight: 700; color: #0a110d;
            white-space: nowrap;
            touch-action: manipulation;
        }
        .fab:active { transform: scale(0.95); }
        .fab.recording { background: #ef4444; box-shadow: 0 4px 24px rgba(239,68,68,0.45); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.04); } }
        .fab svg { width: 20px; height: 20px; flex-shrink: 0; }

        .method-picker-overlay,
        .overlay {
            position: fixed;
            inset: 0;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.2s ease, visibility 0.2s ease;
        }

        .method-picker-overlay.active,
        .overlay.active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        .method-picker-overlay {
            background: rgba(0,0,0,0.82);
            z-index: 200;
            display: flex;
            align-items: flex-end;
            padding: 0;
        }
        .method-sheet {
            width: 100%;
            background: var(--surface);
            border-radius: 24px 24px 0 0;
            padding: 12px 16px 32px;
            border-top: 1px solid var(--border);
            transform: translateY(100%);
            transition: transform 0.25s cubic-bezier(0.34,1.2,0.64,1);
        }
        .method-picker-overlay.active .method-sheet { transform: translateY(0); }
        .method-sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 100px; margin: 0 auto 20px; }
        .method-sheet-title { font-size: 13px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; text-align: center; }
        .method-card {
            display: flex; align-items: center; gap: 16px;
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: 14px; padding: 16px;
            margin-bottom: 10px; cursor: pointer;
            transition: all 0.15s;
            touch-action: manipulation;
        }
        .method-card:active { background: #1e3028; border-color: var(--protein); }
        .method-icon {
            width: 46px; height: 46px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; flex-shrink: 0;
        }
        .method-icon.voice { background: rgba(239,68,68,0.12); }
        .method-icon.describe { background: rgba(16,185,129,0.12); }
        .method-icon.manual { background: rgba(52,211,153,0.12); }
        .method-text { flex: 1; }
        .method-label { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
        .method-desc { font-size: 12px; color: var(--text-muted); line-height: 1.4; }
        .method-arrow { color: var(--text-muted); }
        .method-cancel { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--surface2); color: var(--text-muted); font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 4px; touch-action: manipulation; }

        .overlay {
            background: rgba(10,17,13,0.97);
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .overlay-title { font-size: 22px; font-weight: 800; margin-bottom: 6px; text-align: center; }
        .overlay-sub { font-size: 13px; color: var(--text-muted); text-align: center; margin-bottom: 24px; line-height: 1.5; }

        .transcript-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            width: 100%;
            min-height: 80px;
            font-size: 16px;
            line-height: 1.5;
            color: var(--text);
            margin-bottom: 20px;
            word-break: break-word;
        }

        .mic-anim {
            width: 110px; height: 110px;
            border-radius: 50%;
            background: rgba(239,68,68,0.08);
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 28px;
            position: relative;
        }
        .mic-anim::before, .mic-anim::after {
            content: '';
            position: absolute; border-radius: 50%;
            border: 2px solid rgba(239,68,68,0.25);
            animation: sonar 2s infinite;
        }
        .mic-anim::before { width: 100%; height: 100%; }
        .mic-anim::after { width: 145%; height: 145%; animation-delay: 0.6s; }
        @keyframes sonar { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(1.4); opacity: 0; } }

        .btn-row { display: flex; gap: 10px; width: 100%; }
        .btn {
            flex: 1; padding: 14px; border-radius: 12px; border: none;
            font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.15s;
            touch-action: manipulation;
        }
        .btn-primary { background: var(--protein); color: #0a110d; }
        .btn-secondary { background: var(--surface2); color: var(--text); }
        .btn:active { transform: scale(0.96); }
        .btn-full { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--protein); color: #0a110d; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.15s; touch-action: manipulation; }
        .btn-full:active { transform: scale(0.98); }

        .macro-edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; width: 100%; }
        .macro-input-wrap { background: var(--surface2); border-radius: 12px; padding: 12px; }
        .macro-input-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
        .macro-input { background: none; border: none; color: var(--text); font-size: 22px; font-weight: 800; width: 100%; outline: none; }
        .macro-input-unit { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

        .loading-state { display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 32px; }
        .spinner { width: 38px; height: 38px; border: 3px solid var(--border); border-top-color: var(--protein); border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .meal-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); gap: 10px; }
        .meal-item:last-child { border-bottom: none; }
        .meal-info { flex: 1; }
        .meal-name { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
        .meal-macros { font-size: 12px; color: var(--text-muted); }
        .meal-protein-col { text-align: right; }
        .meal-protein-val { font-size: 16px; font-weight: 800; color: var(--protein); }
        .meal-protein-lbl { font-size: 10px; color: var(--text-muted); }
        .meal-del { background: none; border: none; color: var(--border); cursor: pointer; padding: 4px; transition: color 0.2s; touch-action: manipulation; }
        .meal-del:hover { color: #ef4444; }

        .body-log-form { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
        .input-wrap { background: var(--surface2); border-radius: 12px; padding: 14px; }
        .input-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
        .input-field { background: none; border: none; color: var(--text); font-size: 26px; font-weight: 800; width: 100%; outline: none; }
        .input-field::placeholder { color: var(--border); }
        .input-unit { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

        .body-log-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
        .body-log-item:last-child { border-bottom: none; }
        .body-log-date { color: var(--text-muted); font-size: 12px; }
        .body-log-vals { display: flex; gap: 16px; }
        .body-log-val .val { font-weight: 700; font-size: 15px; }
        .body-log-val .lbl { font-size: 10px; color: var(--text-muted); text-align: right; }
        .body-log-list { max-height: 280px; overflow-y: auto; }

        .hit-rate-card { text-align: center; padding: 28px 20px; }
        .hit-rate-number { font-size: 72px; font-weight: 900; color: var(--protein); line-height: 1; letter-spacing: -2px; }
        .hit-rate-label { font-size: 15px; font-weight: 600; margin-top: 8px; }
        .hit-rate-sub { font-size: 12px; color: var(--text-muted); margin-top: 6px; line-height: 1.4; }

        .period-toggle { display: flex; background: var(--surface); border-radius: 10px; padding: 3px; margin-bottom: 14px; border: 1px solid var(--border); }
        .period-btn { flex: 1; padding: 9px; border: none; border-radius: 8px; background: none; color: var(--text-muted); font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; touch-action: manipulation; }
        .period-btn.active { background: var(--protein); color: #0a110d; }

        .chart-wrap { position: relative; height: 200px; }

        .settings-section { margin-bottom: 24px; }
        .settings-title { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .setting-item { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 8px; }
        .setting-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
        .setting-input { background: none; border: none; color: var(--text); font-size: 16px; font-weight: 600; width: 100%; outline: none; }
        .setting-input::placeholder { color: var(--border); }
        .setting-note { font-size: 11px; color: var(--text-muted); padding: 0 4px 12px; line-height: 1.5; }

        .empty-state { text-align: center; padding: 32px 20px; color: var(--text-muted); }
        .empty-state-icon { font-size: 36px; margin-bottom: 10px; }
        .empty-state h3 { font-size: 15px; font-weight: 700; margin-bottom: 6px; color: var(--text); }
        .empty-state p { font-size: 13px; line-height: 1.5; }

        .toast {
            position: fixed; top: 20px; left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 10px 22px;
            font-size: 14px; font-weight: 600;
            z-index: 1000;
            transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
            white-space: nowrap;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.success { border-color: var(--protein); color: var(--protein); }
        .toast.error { border-color: #ef4444; color: #ef4444; }

        .text-protein { color: var(--protein); }
        .text-carbs { color: var(--carbs); }
        .text-fat { color: var(--fat); }
        .text-calories { color: var(--calories); }

        .install-banner {
            background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
            padding: 14px 16px; margin-bottom: 16px;
            display: none; align-items: center; gap: 12px;
        }
        .install-banner.visible { display: flex; }
        .install-banner p { flex: 1; font-size: 13px; color: var(--text-muted); line-height: 1.4; }
        .install-btn { background: var(--protein); color: #0a110d; border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; touch-action: manipulation; }

        .calorie-counter-card { padding: 18px 20px; }
        .calorie-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
        .calorie-current-val { font-size: 36px; font-weight: 900; color: var(--calories); line-height: 1; letter-spacing: -1px; }
        .calorie-target-val { font-size: 13px; color: var(--text-muted); font-weight: 600; }
        .calorie-bar-track { background: var(--border); border-radius: 100px; height: 10px; overflow: hidden; margin-bottom: 8px; }
        .calorie-bar-fill { height: 100%; border-radius: 100px; background: var(--calories); transition: width 0.8s cubic-bezier(0.4,0,0.2,1); width: 0%; }
        .calorie-bar-fill.over { background: #ef4444; }
        .calorie-footer { display: flex; justify-content: space-between; }
        .calorie-remaining { font-size: 12px; color: var(--text-muted); font-weight: 600; }
        .calorie-pct { font-size: 12px; color: var(--calories); font-weight: 700; }

        .meal-item-body { flex: 1; display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 4px 0; border-radius: 8px; transition: background 0.15s; }
        .meal-item-body:active { background: var(--surface2); }

        .edit-meal-name-input {
            background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
            padding: 10px 14px; color: var(--text); font-size: 15px; font-weight: 600;
            width: 100%; outline: none; margin-bottom: 16px; font-family: inherit;
        }
        .edit-meal-name-input:focus { border-color: var(--protein); }

        .build-overlay-inner {
            width: 100%; display: flex; flex-direction: column;
            max-height: 90vh; overflow: hidden;
        }
        .build-header { flex-shrink: 0; margin-bottom: 12px; }
        .build-food-list { flex: 1; overflow-y: auto; margin-bottom: 8px; }
        .build-footer { flex-shrink: 0; }
        .food-item-row {
            display: flex; align-items: center; gap: 10px;
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: 12px; padding: 12px; margin-bottom: 8px;
        }
        .food-item-info { flex: 1; min-width: 0; }
        .food-item-name { font-size: 14px; font-weight: 600; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .food-item-macros { font-size: 11px; color: var(--text-muted); }
        .food-item-remove { background: none; border: none; color: var(--border); cursor: pointer; padding: 4px; flex-shrink: 0; transition: color 0.2s; touch-action: manipulation; }
        .food-item-remove:hover { color: #ef4444; }
        .add-food-btn {
            width: 100%; padding: 13px; border: 2px dashed var(--border);
            border-radius: 12px; background: none; color: var(--text-muted);
            font-size: 14px; font-weight: 700; cursor: pointer;
            transition: all 0.2s; margin-bottom: 12px; display: flex;
            align-items: center; justify-content: center; gap: 8px;
            touch-action: manipulation;
        }
        .add-food-btn:active { border-color: var(--protein); color: var(--protein); }
        .meal-totals-row {
            background: var(--surface2); border-radius: 12px;
            padding: 12px 14px; margin-bottom: 14px;
            display: grid; grid-template-columns: repeat(4,1fr); gap: 4px; text-align: center;
        }
        .meal-total-col .t-val { font-size: 15px; font-weight: 800; }
        .meal-total-col .t-lbl { font-size: 10px; color: var(--text-muted); margin-top: 1px; }
        .meal-name-input {
            background: var(--surface2); border: 1px solid var(--border); border-radius: 12px;
            padding: 12px 14px; color: var(--text); font-size: 16px; font-weight: 600;
            width: 100%; outline: none; margin-bottom: 12px; font-family: inherit;
        }
        .meal-name-input:focus { border-color: var(--protein); }
        .meal-name-input::placeholder { color: var(--text-muted); }

        .food-picker-list { max-height: 42vh; overflow-y: auto; margin-bottom: 10px; }
        .fav-pick-card {
            display: flex; align-items: center; gap: 12px;
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: 12px; padding: 13px 14px; margin-bottom: 8px;
            cursor: pointer; transition: border-color 0.15s;
            touch-action: manipulation;
        }
        .fav-pick-card:active { border-color: var(--protein); }
        .fav-pick-star { font-size: 18px; flex-shrink: 0; }
        .fav-pick-info { flex: 1; min-width: 0; }
        .fav-pick-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
        .fav-pick-macros { font-size: 11px; color: var(--text-muted); }
        .new-food-card {
            width: 100%; padding: 14px; border: 2px dashed var(--border);
            border-radius: 12px; background: none; color: var(--protein);
            font-size: 15px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            margin-bottom: 10px;
            touch-action: manipulation;
        }
        .new-food-card:active { border-color: var(--protein); }
        .picker-section-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }

        .save-fav-row {
            display: flex; align-items: center; gap: 12px;
            background: var(--surface2); border-radius: 12px;
            padding: 12px 14px; margin-bottom: 16px; cursor: pointer;
            touch-action: manipulation;
        }
        .save-fav-text { flex: 1; }
        .save-fav-label { font-size: 14px; font-weight: 600; }
        .save-fav-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
        .toggle-pill {
            width: 46px; height: 26px; border-radius: 13px;
            background: var(--border); position: relative;
            transition: background 0.2s; flex-shrink: 0;
        }
        .toggle-pill.on { background: var(--protein); }
        .toggle-pill::after {
            content: ''; width: 20px; height: 20px; border-radius: 50%;
            background: white; position: absolute; top: 3px; left: 3px; transition: left 0.2s;
        }
        .toggle-pill.on::after { left: 23px; }

        .fav-list-item {
            display: flex; align-items: center; gap: 10px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 12px 14px; margin-bottom: 8px;
        }
        .fav-list-info { flex: 1; }
        .fav-list-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
        .fav-list-macros { font-size: 11px; color: var(--text-muted); }
        .fav-list-del { background: none; border: none; color: var(--border); cursor: pointer; padding: 4px; transition: color 0.15s; touch-action: manipulation; }
        .fav-list-del:hover { color: #ef4444; }

        .manual-textarea {
            width: 100%; background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; padding: 16px; color: var(--text); font-size: 16px;
            min-height: 100px; resize: none; outline: none; margin-bottom: 16px;

<script>

const RDI = {
    fiber:     { label: 'Fiber',      unit: 'g',   dv: 28,   group: 'Other' },
    satFat:    { label: 'Sat. Fat',   unit: 'g',   dv: 20,   group: 'Other' },
    sugar:     { label: 'Sugar',      unit: 'g',   dv: 50,   group: 'Other' },
    sodium:    { label: 'Sodium',     unit: 'mg',  dv: 2300, group: 'Minerals' },
    vitA:      { label: 'Vitamin A',  unit: 'mcg', dv: 900,  group: 'Vitamins' },
    vitC:      { label: 'Vitamin C',  unit: 'mg',  dv: 90,   group: 'Vitamins' },
    vitD:      { label: 'Vitamin D',  unit: 'mcg', dv: 20,   group: 'Vitamins' },
    vitB12:    { label: 'Vitamin B12',unit: 'mcg', dv: 2.4,  group: 'Vitamins' },

};
const MICRO_KEYS = Object.keys(RDI);

function toggleMicroFields() {}

let db;
function initDB() {
    return new Promise((resolve, reject) => {
        const req = indexedDB.open('MacroTrackDB', 3);
        req.onupgradeneeded = (e) => {
            const d = e.target.result;
            if (!d.objectStoreNames.contains('meals')) {
                const s = d.createObjectStore('meals', { keyPath: 'id' });
                s.createIndex('date', 'date');
            }
            if (!d.objectStoreNames.contains('bodyLogs')) {
                const s = d.createObjectStore('bodyLogs', { keyPath: 'id' });
                s.createIndex('date', 'date');
            }
            if (!d.objectStoreNames.contains('settings')) {
                d.createObjectStore('settings', { keyPath: 'key' });
            }
            if (!d.objectStoreNames.contains('favorites')) {
                d.createObjectStore('favorites', { keyPath: 'id' });
            }
        };
        req.onsuccess = (e) => { db = e.target.result; resolve(); };
        req.onerror = reject;
    });
}

function dbOp(store, mode, fn) {
    return new Promise((resolve, reject) => {
        const tx = db.transaction(store, mode);
        const s = tx.objectStore(store);
        const r = fn(s);
        r.onsuccess = () => resolve(r.result);
        r.onerror = reject;
    });
}
function dbGetAll(store, idx, q) {
    return new Promise((resolve, reject) => {
        const tx = db.transaction(store, 'readonly');
        const s = tx.objectStore(store);
        const r = idx ? s.index(idx).getAll(q) : s.getAll();
        r.onsuccess = () => resolve(r.result);
        r.onerror = reject;
    });
}

const saveMealDB = m => dbOp('meals', 'readwrite', s => s.put(m));
const delMealDB = id => dbOp('meals', 'readwrite', s => s.delete(id));
const getMealsByDate = date => dbGetAll('meals', 'date', date);
const getAllMeals = () => dbGetAll('meals');
const saveBodyDB = l => dbOp('bodyLogs', 'readwrite', s => s.put(l));
const getAllBody = () => dbGetAll('bodyLogs');
const saveFavDB  = f => dbOp('favorites', 'readwrite', s => s.put(f));
const delFavDB   = id => dbOp('favorites', 'readwrite', s => s.delete(id));
const getAllFavs = () => dbGetAll('favorites');
const saveSetting = (k, v) => dbOp('settings', 'readwrite', s => s.put({ key: k, value: v }));
const getSetting = k => new Promise((resolve, reject) => {
    const tx = db.transaction('settings', 'readonly');
    const r = tx.objectStore('settings').get(k);
    r.onsuccess = () => resolve(r.result ? r.result.value : null);
    r.onerror = reject;
});

let settings = {
    proteinTarget: 150,
    carbsTarget: 200,
    fatTarget: 60,
    calsExercise: 2050,
    calsRest: 1850,
    weightUnit: 'lbs',
    measureUnit: 'in'
};
let todayDayType = 'rest';
let currentTab = 'today';
let charts = {};
let trendPeriod = 7;
let recognition = null;
let finalTranscript = '';
let deferredInstallPrompt = null;
let editingMealId = null;
let editingBodyId = null;
let buildingItems = [];
let editingBuildItemIndex = null;
let favPickerMode = 'build';
let saveFavOn = false;
let baseNutrition = null;

function isIOS() {
    return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
        (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
}

function isStandalone() {
    return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
}

let bodyScrollY = 0;
function lockBodyScroll() {
    bodyScrollY = window.scrollY || window.pageYOffset || 0;
    document.body.classList.add('modal-open');
    document.body.style.top = `-${bodyScrollY}px`;
}

function unlockBodyScroll() {
    document.body.classList.remove('modal-open');
    document.body.style.top = '';
    window.scrollTo(0, bodyScrollY);
}

function getOpenOverlays() {
    return [...document.querySelectorAll('.overlay.active, .method-picker-overlay.active')];
}

function openOverlay(id, focusSelector = null) {
    const el = document.getElementById(id);
    if (!el) return;
    if (!getOpenOverlays().length) lockBodyScroll();
    el.classList.add('active');
    if (focusSelector) safeFocus(focusSelector, 140);
}

function closeOverlay(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.remove('active');
    const active = document.activeElement;
    if (active && /INPUT|TEXTAREA|SELECT/.test(active.tagName)) active.blur();
    requestAnimationFrame(() => {
        if (!getOpenOverlays().length) unlockBodyScroll();
    });
}

function closeAllOverlays() {
    document.querySelectorAll('.overlay.active, .method-picker-overlay.active').forEach(el => el.classList.remove('active'));
    const active = document.activeElement;
    if (active && /INPUT|TEXTAREA|SELECT/.test(active.tagName)) active.blur();
    unlockBodyScroll();
    stopVoice();
    const manual = document.getElementById('manualInput');
    if (manual) manual.value = '';
}

function safeFocus(selectorOrEl, delay = 80) {
    const el = typeof selectorOrEl === 'string' ? document.querySelector(selectorOrEl) : selectorOrEl;
    if (!el) return;
    requestAnimationFrame(() => {
        setTimeout(() => {
            try {
                el.focus({ preventScroll: true });
                if (isIOS()) {
                    el.scrollIntoView({ block: 'center', inline: 'nearest' });
                }
            } catch (err) {
                try { el.focus(); } catch (_) {}
            }
        }, delay);
    });
}

function installIOSInputStability() {
    document.addEventListener('focusin', (e) => {
        const el = e.target;
        if (!el || !/INPUT|TEXTAREA|SELECT/.test(el.tagName)) return;
        setTimeout(() => {
            try { el.scrollIntoView({ block: 'center', inline: 'nearest' }); } catch (_) {}
        }, 250);
    });

    document.addEventListener('click', (e) => {
        const el = e.target.closest('input, textarea, select');
        if (!el) return;
        if (isIOS() && isStandalone()) {
            setTimeout(() => {
                if (document.activeElement !== el) safeFocus(el, 0);
            }, 0);
        }
    }, true);
}

function activeCalsTarget() {
    return todayDayType === 'exercise' ? settings.calsExercise : settings.calsRest;
}

function updateDayTypeToggle() {
    const restBtn = document.getElementById('dayTypeBtnRest');
    const exBtn   = document.getElementById('dayTypeBtnExercise');
    if (!restBtn || !exBtn) return;
    const isExercise = todayDayType === 'exercise';
    restBtn.style.background = isExercise ? 'transparent' : 'var(--protein)';
    restBtn.style.color = isExercise ? 'var(--text-muted)' : '#fff';
    exBtn.style.background = isExercise ? 'var(--protein)' : 'transparent';
    exBtn.style.color = isExercise ? '#fff' : 'var(--text-muted)';
}

async function setDayType(type) {
    todayDayType = type;
    await saveSetting('dayType_' + todayStr(), type);
    updateDayTypeToggle();
    refreshToday();
}

async function loadSettings() {
    const keys = ['proteinTarget','carbsTarget','fatTarget','calsExercise','calsRest','weightUnit','measureUnit'];
    for (const k of keys) {
        const v = await getSetting(k);
        if (v !== null) settings[k] = v;
    }
    const legacyCals = await getSetting('calsTarget');
    if (legacyCals && !await getSetting('calsExercise')) {
        settings.calsExercise = legacyCals;
        settings.calsRest = legacyCals;
    }
    document.getElementById('proteinTargetInput').value = settings.proteinTarget;
    document.getElementById('carbsTargetInput').value = settings.carbsTarget;
    document.getElementById('fatTargetInput').value = settings.fatTarget;
    document.getElementById('calsExerciseInput').value = settings.calsExercise;
    document.getElementById('calsRestInput').value = settings.calsRest;
    document.getElementById('weightUnitSelect').value = settings.weightUnit;
    document.getElementById('measureUnitSelect').value = settings.measureUnit;
    updateUnitLabels();

    const savedDayType = await getSetting('dayType_' + todayStr());
    todayDayType = savedDayType || 'rest';
    updateDayTypeToggle();
}

function updateUnitLabels() {
    document.getElementById('weightUnitLabel').textContent = settings.weightUnit;
    document.getElementById('waistUnitLabel').textContent = settings.measureUnit === 'in' ? 'inches' : 'cm';
}

document.getElementById('saveSettingsBtn').addEventListener('click', async () => {
    settings.proteinTarget = parseFloat(document.getElementById('proteinTargetInput').value) || 150;
    settings.carbsTarget = parseFloat(document.getElementById('carbsTargetInput').value) || 200;
    settings.fatTarget = parseFloat(document.getElementById('fatTargetInput').value) || 60;
    settings.calsExercise = parseFloat(document.getElementById('calsExerciseInput').value) || 2050;
    settings.calsRest = parseFloat(document.getElementById('calsRestInput').value) || 1850;
    settings.weightUnit = document.getElementById('weightUnitSelect').value;
    settings.measureUnit = document.getElementById('measureUnitSelect').value;
    for (const [k, v] of Object.entries(settings)) await saveSetting(k, v);
    updateUnitLabels();
    showToast('Settings saved', 'success');
    refreshToday();
});

document.querySelectorAll('.nav-item').forEach(item => {

function switchTab(tab) {

function todayStr() { return new Date().toISOString().split('T')[0]; }
function formatDate(d) {
    const [y, m, day] = d.split('-');
    return new Date(+y, +m - 1, +day).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}
function getDateRange(days) {
    const arr = [];
    for (let i = days - 1; i >= 0; i--) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        arr.push(d.toISOString().split('T')[0]);
    }
    return arr;
}

function renderMicroCard(micros) {
    const card = document.getElementById('microCard');
    const content = document.getElementById('microGaugeContent');
    card.style.display = '';
    const hasData = MICRO_KEYS.some(k => micros[k] > 0);
    if (!hasData) {
        content.innerHTML = `<div class="micro-empty">Log a meal and your vitamin and mineral breakdown will appear here.</div>`;
        return;
    }
    const groups = ['Vitamins', 'Minerals', 'Other'];
    let html = '';
    groups.forEach(group => {
        const keys = MICRO_KEYS.filter(k => RDI[k].group === group);
        const relevant = keys.filter(k => micros[k] > 0);
        if (!relevant.length) return;
        html += `<div class="micro-group-title">${group}</div>`;
        relevant.forEach(k => {
            const r = RDI[k];
            const val = micros[k];
            const pctDisplay = Math.round((val / r.dv) * 100);
            const over = val > r.dv;
            const warn = pctDisplay >= 80 && pctDisplay < 100;
            const fillClass = over ? 'over' : (warn ? 'warn' : '');
            const fillW = Math.min((val / r.dv) * 100, 100);
            const dispVal = val < 10 ? Math.round(val * 10) / 10 : Math.round(val);
            html += `
            <div class="micro-row">
                <div class="micro-label-col">
                    <div class="micro-name">${r.label}</div>
                    <div class="micro-val">${dispVal}${r.unit} / ${r.dv}${r.unit}</div>
                </div>
                <div class="micro-bar-track"><div class="micro-bar-fill ${fillClass}" style="width:${fillW}%"></div></div>
                <div class="micro-pct-col"><div class="micro-pct" style="color:${over ? '#f87171' : 'var(--text-muted)'}">${pctDisplay}%</div></div>
            </div>`;
        });
    });
    content.innerHTML = html;
}

async function refreshToday() {
    const now = new Date();
    const h = now.getHours();
    const greeting = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
    document.getElementById('todayGreetingLine').textContent = `${greeting}, Deep`;
    document.getElementById('todayDateLine').textContent = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
    document.getElementById('proteinTargetLabel').textContent = `/ ${settings.proteinTarget}g`;
    document.getElementById('carbsTargetLabel').textContent = `/ ${settings.carbsTarget}g`;
    document.getElementById('fatTargetLabel').textContent = `/ ${settings.fatTarget}g`;
    document.getElementById('calsTargetLabel').textContent = `/ ${activeCalsTarget()}`;

    const meals = await getMealsByDate(todayStr());
    const zeroMicros = () => Object.fromEntries(MICRO_KEYS.map(k => [k, 0]));
    const mealMicros = zeroMicros();
    meals.forEach(m => {
        if (m.micros) MICRO_KEYS.forEach(k => { mealMicros[k] += (m.micros[k] || 0); });
        if (m.items) {
            m.items.forEach(item => {
                if (item.micros) MICRO_KEYS.forEach(k => { mealMicros[k] += (item.micros[k] || 0); });
            });
        }
    });
    renderMicroCard(mealMicros);

    const t = meals.reduce((a, m) => ({
        protein: a.protein + (m.protein || 0),
        carbs: a.carbs + (m.carbs || 0),
        fat: a.fat + (m.fat || 0),
        calories: a.calories + (m.calories || 0)
    }), { protein: 0, carbs: 0, fat: 0, calories: 0 });

    setRing('proteinRingCircle', t.protein, settings.proteinTarget, 264);
    setMiniRing('carbsRingCircle', t.carbs, settings.carbsTarget);
    setMiniRing('fatRingCircle', t.fat, settings.fatTarget);
    setMiniRing('calsRingCircle', t.calories, activeCalsTarget());

    document.getElementById('proteinValue').textContent = Math.round(t.protein);
    document.getElementById('carbsValue').textContent = Math.round(t.carbs) + 'g';
    document.getElementById('fatValue').textContent = Math.round(t.fat) + 'g';
    document.getElementById('calsValue').textContent = Math.round(t.calories);

    const calPct = Math.min(t.calories / (activeCalsTarget() || 1), 1);
    const calOver = t.calories > activeCalsTarget();
    const calRemaining = Math.round(activeCalsTarget() - t.calories);
    document.getElementById('calCurrentDisplay').textContent = Math.round(t.calories).toLocaleString();
    document.getElementById('calTargetDisplay').textContent = activeCalsTarget().toLocaleString();
    const barFill = document.getElementById('calBarFill');
    barFill.style.width = (calPct * 100) + '%';
    barFill.classList.toggle('over', calOver);
    document.getElementById('calRemainingDisplay').textContent = calOver ? `${Math.abs(calRemaining)} over target` : `${calRemaining} remaining`;
    document.getElementById('calPctDisplay').textContent = Math.round(calPct * 100) + '%';

    const list = document.getElementById('mealsList');
    if (!meals.length) {
        list.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🍽️</div><h3>No meals logged yet</h3><p>Tap the green button to log your first meal</p></div>`;
    } else {
        list.innerHTML = meals.map(m => `
            <div class="meal-item">
                <div class="meal-item-body" onclick="openEditMeal(${m.id})">
                    <div class="meal-info">
                        <div class="meal-name">${m.name}${m.items && m.items.length ? `<span style="font-size:10px;color:var(--text-muted);font-weight:500;margin-left:6px;">${m.items.length} items</span>` : ''}</div>
                        <div class="meal-macros">
                            <span class="text-carbs">C: ${Math.round(m.carbs)}g</span>&nbsp;&nbsp;
                            <span class="text-fat">F: ${Math.round(m.fat)}g</span>&nbsp;&nbsp;
                            <span class="text-calories">${Math.round(m.calories)} kcal</span>
                        </div>
                    </div>
                    <div class="meal-protein-col">
                        <div class="meal-protein-val">${Math.round(m.protein)}g</div>
                        <div class="meal-protein-lbl">protein</div>
                    </div>
                </div>
                <button class="meal-del" onclick="deleteMeal(${m.id})" title="Delete">✕</button>
            </div>
        `).join('');
    }
}

function setRing(id, val, target, circ) {
    const pct = Math.min(val / (target || 1), 1);
    document.getElementById(id).setAttribute('stroke-dasharray', `${pct * circ} ${circ}`);
}
function setMiniRing(id, val, target) { setRing(id, val, target, 150.8); }

                    <span class="text-carbs">C: ${item.carbs}g</span>&nbsp;
                    <span class="text-fat">F: ${item.fat}g</span>&nbsp;
                    <span class="text-calories">${item.calories} kcal</span>
                </div>
            </div>
            <div style="display:flex; align-items:center; gap:4px; flex-shrink:0;">
                <button onclick="event.stopPropagation(); editBuildItem(${i})" title="Edit" style="background:none; border:none; color:var(--text-muted); font-size:15px; cursor:pointer; padding:6px 4px;">✏️</button>
                <button class="food-item-remove" onclick="event.stopPropagation(); removeBuildItem(${i})" title="Remove">✕</button>
            </div>

function captureBaseNutrition() {
    const qty = parseFloat(document.getElementById('foodDetailQty').value) || 1;
    const r = v => (parseFloat(v) || 0) / qty;
    const micros = {};
    MICRO_KEYS.forEach(k => { micros[k] = (parseFloat(document.getElementById('mf_' + k).value) || 0) / qty; });
    baseNutrition = {
        protein: r(document.getElementById('foodDetailProtein').value),
        carbs: r(document.getElementById('foodDetailCarbs').value),
        fat: r(document.getElementById('foodDetailFat').value),
        calories: r(document.getElementById('foodDetailCalories').value),
        micros
    };
}

function applyBaseToQty(qty) {
    if (!baseNutrition || qty <= 0) return;
    const r1 = v => Math.round(v * 10) / 10;
    const ri = v => Math.round(v);
    document.getElementById('foodDetailProtein').value = r1(baseNutrition.protein * qty) || '';
    document.getElementById('foodDetailCarbs').value = r1(baseNutrition.carbs * qty) || '';
    document.getElementById('foodDetailFat').value = r1(baseNutrition.fat * qty) || '';
    document.getElementById('foodDetailCalories').value = ri(baseNutrition.calories * qty) || '';
    MICRO_KEYS.forEach(k => {
        const val = r1(baseNutrition.micros[k] * qty);
        document.getElementById('mf_' + k).value = val || '';
    });
}

function stepQty(delta) {
    const input = document.getElementById('foodDetailQty');
    const unit = document.getElementById('foodDetailUnit').value;
    let step = 1;
    if (unit === 'g' || unit === 'ml') step = 10;
    else if (unit === 'oz') step = 0.5;
    else if (unit === 'lbs') step = 0.25;
    if (!baseNutrition) captureBaseNutrition();
    let current = parseFloat(input.value) || 0;
    let next = Math.max(step, parseFloat((current + delta * step).toFixed(3)));
    input.value = next % 1 === 0 ? String(next) : String(next);
    applyBaseToQty(next);
    input.dispatchEvent(new Event('input'));
}
window.stepQty = stepQty;

function startVoice() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = 'en-US';
    finalTranscript = '';
    recognition.onresult = (e) => {
        let interim = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
            if (e.results[i].isFinal) finalTranscript += e.results[i][0].transcript + ' ';
            else interim = e.results[i][0].transcript;
        }
        const display = (finalTranscript + interim).trim();
        if (display) {
            const el = document.getElementById('liveTranscript');
            el.textContent = display;
            el.style.color = 'var(--text)';
            el.style.fontStyle = 'normal';
        }
    };
    recognition.onerror = () => {
        showToast('Mic error. Switching to text input', 'error');
        stopVoice();
        closeOverlay('voiceOverlay');
        openOverlay('manualOverlay', '#manualInput');
    };
    recognition.start();
    openOverlay('voiceOverlay');
    showStep('listen');
    fabMic.classList.add('recording');
    document.getElementById('liveTranscript').textContent = 'Speak now...';
    document.getElementById('liveTranscript').style.color = 'var(--text-muted)';
    document.getElementById('liveTranscript').style.fontStyle = 'italic';
}

function stopVoice() {
    if (recognition) {
        recognition.stop();
        recognition = null;
    }
    fabMic.classList.remove('recording');
}

async function renderTrends() {
    const allMeals = await getAllMeals();
    const dates = getDateRange(trendPeriod);
    const byDate = {};
    allMeals.forEach(m => { if (!byDate[m.date]) byDate[m.date] = []; byDate[m.date].push(m); });
    const daily = dates.map(date => {
        const ms = byDate[date] || [];
        return {
            date,
            logged: ms.length > 0,
            protein: ms.reduce((s, m) => s + (m.protein || 0), 0),
            carbs: ms.reduce((s, m) => s + (m.carbs || 0), 0),
            fat: ms.reduce((s, m) => s + (m.fat || 0), 0),
            calories: ms.reduce((s, m) => s + (m.calories || 0), 0)
        };
    });
    const logged = daily.filter(d => d.logged);
    const hit = logged.filter(d => d.protein >= settings.proteinTarget * 0.8);
    const rate = logged.length ? Math.round((hit.length / logged.length) * 100) : null;
    document.getElementById('hitRateNumber').textContent = rate !== null ? rate + '%' : '--';
    document.getElementById('hitRateSub').textContent = logged.length ? `${hit.length} of ${logged.length} logged days hit at least 80% of your ${settings.proteinTarget}g target` : 'No data logged in this period';

    if (charts.protein) { charts.protein.destroy(); charts.protein = null; }
    charts.protein = new Chart(document.getElementById('proteinChart'), {
        type: 'bar',
        data: {
            labels: daily.map(d => formatDate(d.date)),
            datasets: [
                { label: 'Protein (g)', data: daily.map(d => d.logged ? Math.round(d.protein) : null), backgroundColor: daily.map(d => d.protein >= settings.proteinTarget * 0.8 ? 'rgba(16,185,129,0.85)' : 'rgba(16,185,129,0.3)'), borderRadius: 5 },
                { label: 'Target', data: daily.map(() => settings.proteinTarget), type: 'line', borderColor: 'rgba(16,185,129,0.4)', borderDash: [5, 5], pointRadius: 0, fill: false }
            ]
        },
        options: chartOpts('g', true)
    });

    if (charts.macros) { charts.macros.destroy(); charts.macros = null; }
    charts.macros = new Chart(document.getElementById('macrosChart'), {
        type: 'line',
        data: {
            labels: daily.map(d => formatDate(d.date)),
            datasets: [
                { label: 'Protein', data: daily.map(d => d.logged ? Math.round(d.protein) : null), borderColor: '#10b981', tension: 0.4, pointRadius: 3 },
                { label: 'Carbs', data: daily.map(d => d.logged ? Math.round(d.carbs) : null), borderColor: '#f59e0b', tension: 0.4, pointRadius: 3 },
                { label: 'Fat', data: daily.map(d => d.logged ? Math.round(d.fat) : null), borderColor: '#f87171', tension: 0.4, pointRadius: 3 }
            ]
        },
        options: chartOpts('g', true)
    });

    if (charts.cals) { charts.cals.destroy(); charts.cals = null; }
    charts.cals = new Chart(document.getElementById('calsChart'), {
        type: 'bar',
        data: {
            labels: daily.map(d => formatDate(d.date)),
            datasets: [
                { label: 'Calories', data: daily.map(d => d.logged ? Math.round(d.calories) : null), backgroundColor: daily.map(d => d.calories >= activeCalsTarget() * 0.8 ? 'rgba(107,114,128,0.85)' : 'rgba(107,114,128,0.35)'), borderRadius: 5 },
                { label: 'Target', data: daily.map(() => activeCalsTarget()), type: 'line', borderColor: 'rgba(107,114,128,0.4)', borderDash: [5, 5], pointRadius: 0, fill: false }
            ]
        },
        options: chartOpts('kcal', true)
    });
}

function chartOpts(unit = 'g', legend = false) {
    return {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
            legend: { display: legend, labels: { color: '#666', font: { size: 11 }, boxWidth: 10 } },
            tooltip: {
                backgroundColor: '#182018',
                titleColor: '#777',
                bodyColor: '#f5f5f5',
                borderColor: '#1e3028',
                borderWidth: 1,
                callbacks: { label: ctx => ` ${ctx.parsed.y}${unit}` }
            }
        },
        scales: {
            x: { ticks: { color: '#555', font: { size: 10 }, maxRotation: 45 }, grid: { color: 'rgba(255,255,255,0.04)' } },
            y: { ticks: { color: '#555', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.04)' } }
        }
    };
}

function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 2800);
}

window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredInstallPrompt = e;
    document.getElementById('installBanner').classList.add('visible');
});

document.getElementById('installBtn').addEventListener('click', async () => {
    if (!deferredInstallPrompt) return;
    deferredInstallPrompt.prompt();
    const { outcome } = await deferredInstallPrompt.userChoice;
    if (outcome === 'accepted') document.getElementById('installBanner').classList.remove('visible');
    deferredInstallPrompt = null;
});

function installNumericInputHints() {
    document.querySelectorAll('input[type="number"]').forEach(el => {
        el.setAttribute('inputmode', 'decimal');
        el.setAttribute('enterkeyhint', 'done');
        el.setAttribute('autocomplete', 'off');
        el.setAttribute('autocorrect', 'off');
        el.setAttribute('spellcheck', 'false');
    });
    document.querySelectorAll('input[type="text"], textarea').forEach(el => {
        el.setAttribute('enterkeyhint', 'done');
        el.setAttribute('autocomplete', 'off');
        el.setAttribute('autocorrect', 'off');
        el.setAttribute('spellcheck', 'false');
    });
}

async function init() {
    installIOSInputStability();
    installNumericInputHints();
    await initDB();
    await loadSettings();
    refreshToday();
}

init().catch(console.error);

// IMPORTANT:
// The old global touchstart focus hack has been intentionally removed.
// Do not bring it back.
</script>
</body>
